  <g transform="translate(506 112)">
    <rect width="190" height="142" rx="18" fill="#0A1118" stroke="#F472B6" stroke-opacity="0.32"/>
    <circle cx="95" cy="73" r="34" fill="#F472B6" fill-opacity="0.08" stroke="#F472B6" stroke-opacity="0.55"/>
    <path d="M79 84L90 73L99 80L112 63" stroke="#F472B6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="112" cy="63" r="4" fill="#F472B6" filter="url(#glow)"/>
    <text x="95" y="24" text-anchor="middle" fill="#F472B6" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="9" letter-spacing="1.5">03 / BUILD</text>
    <text x="95" y="121" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">DIRECT THE WORK</text>
    <text x="95" y="137" text-anchor="middle" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Plan · implement · review</text>
  </g>

  <!-- stage 4 -->
  <g transform="translate(720 112)">
    <rect width="190" height="142" rx="18" fill="#0A1118" stroke="#FBBF24" stroke-opacity="0.32"/>
    <circle cx="95" cy="73" r="34" fill="#FBBF24" fill-opacity="0.08" stroke="#FBBF24" stroke-opacity="0.55"/>
    <path d="M80 73L90 83L111 61" stroke="#FBBF24" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="111" cy="61" r="4" fill="#FBBF24" filter="url(#glow)"/>
    <text x="95" y="24" text-anchor="middle" fill="#FBBF24" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="9" letter-spacing="1.5">04 / VERIFY</text>
    <text x="95" y="121" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">PROVE IT WORKS</text>
    <text x="95" y="137" text-anchor="middle" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Diff · test · build · device</text>
  </g>

  <!-- stage 5 -->
  <g transform="translate(934 112)">
    <rect width="190" height="142" rx="18" fill="#0A1118" stroke="#A3E635" stroke-opacity="0.32"/>
    <circle cx="95" cy="73" r="34" fill="#A3E635" fill-opacity="0.08" stroke="#A3E635" stroke-opacity="0.55"/>
    <path d="M78 78L95 60L112 78M95 60V90" stroke="#A3E635" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="95" cy="60" r="4" fill="#A3E635" filter="url(#glow)"/>
    <text x="95" y="24" text-anchor="middle" fill="#A3E635" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="9" letter-spacing="1.5">05 / SHIP</text>
    <text x="95" y="121" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">HARDEN THE RELEASE</text>
    <text x="95" y="137" text-anchor="middle" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Document · monitor · improve</text>
