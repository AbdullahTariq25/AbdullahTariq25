  <!-- connectors -->
  <g fill="#0B1017" stroke-width="2">
    <circle cx="280" cy="185" r="8" stroke="#8B9DB4"/><path d="M276 185H284M280 181V189" stroke="#8B9DB4"/>
    <circle cx="494" cy="185" r="8" stroke="#B574BA"/><path d="M490 185H498M494 181V189" stroke="#B574BA"/>
    <circle cx="708" cy="185" r="8" stroke="#F09A78"/><path d="M704 185H712M708 181V189" stroke="#F09A78"/>
    <circle cx="922" cy="185" r="8" stroke="#D5CF55"/><path d="M918 185H926M922 181V189" stroke="#D5CF55"/>
  </g>

  <g transform="translate(40 286)">
    <circle cx="6" cy="6" r="4" fill="#A3E635" filter="url(#glow)"/>
    <text x="19" y="10" fill="#D9F99D" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10">HUMAN JUDGMENT ACTIVE AT EVERY STAGE</text>
    <text x="1120" y="10" text-anchor="end" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10">AI IS THE ACCELERATOR — ENGINEERING IS THE CONTROL SYSTEM</text>
